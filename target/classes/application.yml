spring:
  application:
    name: rental-property-manager

  # ── Cassandra ─────────────────────────────────────────────────────────────
  cassandra:
    contact-points: ${CASSANDRA_HOST:localhost}
    port: ${CASSANDRA_PORT:9042}
    keyspace-name: ${CASSANDRA_KEYSPACE:rental_manager}
    local-datacenter: ${CASSANDRA_DC:datacenter1}
    schema-action: create_if_not_exists

  # ── Codec / serialisation ───────────────────────────────────────────────
  codec:
    max-in-memory-size: 10MB

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── OpenAPI / Swagger UI ─────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.example.rentalmanager: DEBUG
    com.datastax.oss.driver: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: 8080
  netty:
    connection-timeout: 10s

---
# ── Test profile ──────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  cassandra:
    schema-action: none