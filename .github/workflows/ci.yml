name: CI — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:  ${{ secrets.AWS_REGION }}
  ECR_URL:     ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/munas-property-manager-prod

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        run: ./mvnw test -q

  # ── 2. Build & push Docker image ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          docker build -t "$ECR_URL:$IMAGE_TAG" -t "$ECR_URL:latest" .
          docker push "$ECR_URL:$IMAGE_TAG"
          docker push "$ECR_URL:latest"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

  # ── 3. Deploy to ECS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster munas-property-manager-prod-cluster \
            --service munas-property-manager-prod-service \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster munas-property-manager-prod-cluster \
            --services munas-property-manager-prod-service \
            --region "$AWS_REGION"
