datastax-java-driver {
  advanced.request-tracker {
    # Enable the built-in RequestLogger that logs every CQL statement
    classes = [RequestLogger]

    logs {
      # Log successful requests at DEBUG
      success.enabled  = true
      # Log slow requests (> 1 s) at WARN even if success logging is on
      slow {
        enabled   = true
        threshold = 1 second
      }
      # Log failed requests at ERROR
      error.enabled = true

      # Include the actual CQL text and bound values in the log line
      max-query-length       = 500
      show-values            = true
      max-value-length       = 50
      max-values             = 10
      show-stack-traces      = true
    }
  }
}
