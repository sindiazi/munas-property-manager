spring:
  application:
    name: rental-property-manager

  # ── Cassandra ─────────────────────────────────────────────────────────────
  cassandra:
    contact-points: ${CASSANDRA_HOST:localhost}
    port: ${CASSANDRA_PORT:9042}
    keyspace-name: ${CASSANDRA_KEYSPACE:rental_manager}
    local-datacenter: ${CASSANDRA_DC:datacenter1}
    schema-action: create_if_not_exists

  # ── Codec / serialisation ───────────────────────────────────────────────
  codec:
    max-in-memory-size: 10MB

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── OpenAPI / Swagger UI ─────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.example.rentalmanager: DEBUG
    # Cassandra request logging — logs every CQL statement + latency
    com.datastax.oss.driver.internal.core.tracker.RequestLogger: DEBUG
    # Suppress other noisy driver internals
    com.datastax.oss.driver: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: 8080
  netty:
    connection-timeout: 10s

# ── Security ─────────────────────────────────────────────────────────────
security:
  # AES-256 key for SSN encryption at rest. Override via env var in production.
  ssn-encryption-key: ${SSN_ENCRYPTION_KEY:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0}

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yandrZXkxMjM0NTY3ODk=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ── CORS ──────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:3000}

# ── M-Pesa (Safaricom Daraja) ─────────────────────────────────────────────
mpesa:
  consumer-key:     ${MPESA_CONSUMER_KEY:test_consumer_key}
  consumer-secret:  ${MPESA_CONSUMER_SECRET:test_consumer_secret}
  short-code:       ${MPESA_SHORT_CODE:174379}
  passkey:          ${MPESA_PASSKEY:bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919}
  callback-url:     ${MPESA_CALLBACK_URL:https://your-ngrok-url/api/v1/invoices/payments/mpesa/callback}
  base-url:         ${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}
  transaction-type: CustomerPayBillOnline

---
# ── Test profile ──────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  cassandra:
    schema-action: none